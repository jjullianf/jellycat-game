<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess That Jelly! 🐰</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff6b9d;
    --pink-light: #ffd6e7;
    --blue: #6bcbff;
    --blue-light: #ddf1ff;
    --yellow: #ffd166;
    --green: #06d6a0;
    --purple: #c77dff;
    --bg: #f8f8fc;
    --card: #ffffff;
    --text: #2d2d2d;
    --text-soft: #8a8a9a;
    --radius: 24px;
    --shadow: 0 8px 32px rgba(255,107,157,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: radial-gradient(circle at 20% 20%, #ede8f5 0%, transparent 40%),
                      radial-gradient(circle at 80% 80%, #ddf1ff 0%, transparent 40%);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--pink);
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 3px 3px 0px rgba(255,107,157,0.15);
  }

  .subtitle {
    font-size: 1rem;
    color: var(--text-soft);
    font-weight: 600;
    text-align: center;
    margin-bottom: 28px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px;
    width: 100%;
    max-width: 520px;
    position: relative;
    overflow: visible;
  }

  /* Silhouette stage */
  .image-wrapper {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto 28px;
    border-radius: 20px;
    overflow: hidden;
    background: var(--pink-light);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .jelly-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 16px;
    transition: filter 0.6s ease;
  }

  .jelly-img.silhouette { filter: brightness(0); }
  .jelly-img.color { filter: brightness(1); }

  /* Guess counter */
  .guess-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e8e8e8;
    transition: background 0.3s;
  }
  .dot.used { background: var(--pink); }
  .dot.wrong { background: #ffb3b3; }

  /* Hint badge */
  .hint-box {
    background: var(--blue-light);
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 18px;
    font-size: 0.9rem;
    font-weight: 700;
    color: #2d7db3;
    text-align: center;
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .hint-box.visible { display: block; }

  /* Search input */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .search-input {
    width: 100%;
    padding: 14px 18px;
    border: 2.5px solid #f0e0e8;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: white;
  }

  .search-input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(255,107,157,0.15);
  }

  .search-input::placeholder { color: #ccc; font-weight: 600; }

  /* Dropdown */
  .dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    border: 2px solid #f0e0e8;
  }
  .dropdown.open { display: block; }

  .dropdown-item {
    padding: 11px 18px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dropdown-item:hover, .dropdown-item.active { background: var(--pink-light); color: var(--pink); }
  .dropdown-item .tag {
    font-size: 0.72rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    background: #f0e0e8;
    color: #b05070;
    flex-shrink: 0;
  }
  .dropdown-item .tag.in-game { background: #d6f5ec; color: #0a7a5a; }

  /* Guess button */
  .btn-guess {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--pink) 0%, #ff8fb3 100%);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(255,107,157,0.35);
    margin-top: 4px;
  }
  .btn-guess:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,157,0.4); }
  .btn-guess:active { transform: translateY(0); }
  .btn-guess:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Skip */
  .btn-skip {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: var(--text-soft);
    border: 2px dashed #e0e0e0;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-skip:hover { border-color: var(--pink); color: var(--pink); }

  /* Result screen */
  .result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .result-screen.visible { display: flex; }

  .result-emoji {
    font-size: 3.5rem;
    margin-bottom: 8px;
    animation: bounce 0.6s ease;
  }

  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    margin-bottom: 6px;
  }
  .result-title.win { color: var(--green); }
  .result-title.lose { color: var(--pink); }

  .result-msg {
    color: var(--text-soft);
    font-weight: 600;
    margin-bottom: 20px;
    font-size: 1rem;
    line-height: 1.5;
  }

  .result-img-wrap {
    width: 200px;
    height: 200px;
    border-radius: 20px;
    overflow: hidden;
    background: var(--pink-light);
    margin-bottom: 16px;
  }

  .result-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 12px;
  }

  .jelly-name-reveal {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--text);
    margin-bottom: 6px;
  }

  .cute-line {
    font-size: 0.95rem;
    color: var(--text-soft);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .btn-amazon {
    display: inline-block;
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--yellow) 0%, #ffb347 100%);
    color: #5a3800;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    text-decoration: none;
    box-shadow: 0 4px 16px rgba(255,209,102,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-bottom: 16px;
  }
  .btn-amazon:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,209,102,0.5); }

  .btn-play-again {
    width: 100%;
    padding: 13px;
    background: white;
    color: var(--pink);
    border: 2.5px solid var(--pink);
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    margin-top: 6px;
  }
  .btn-play-again:hover { background: var(--pink); color: white; }

  /* Confetti */
  .confetti-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -20px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-14px); } 70% { transform: translateY(-6px); } }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.4s ease; }

  .game-section { display: block; }
  .category-label {
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-soft);
    text-align: center;
    margin-bottom: 16px;
  }

  /* scrollbar */
  .dropdown::-webkit-scrollbar { width: 6px; }
  .dropdown::-webkit-scrollbar-track { background: transparent; }
  .dropdown::-webkit-scrollbar-thumb { background: #f0d0dc; border-radius: 10px; }
</style>
</head>

  { name: "Amuseables Ravioli", category: "Amuseables - Food", color: "images/46_Amuseables_Ravioli_color.png", silhouette: "images/46_Amuseables_Ravioli_silhouette.png", amazon: "https://amzn.to/4v8jYLK" },
  { name: "Amuseables Aubergine", category: "Amuseables - Food", color: "images/47_Amuseables_Aubergine_color.png", silhouette: "images/47_Amuseables_Aubergine_silhouette.png", amazon: "https://amzn.to/41L3ATV" },
  { name: "Ramone Bull", category: "Animals - Woodland", color: "images/48_Ramone_Bull_color.png", silhouette: "images/48_Ramone_Bull_silhouette.png", amazon: "https://amzn.to/4duMrFm" },
  { name: "Brooke Otter", category: "Animals - Ocean Life", color: "images/49_Brooke_Otter_color.png", silhouette: "images/49_Brooke_Otter_silhouette.png", amazon: "https://amzn.to/4c4Qupf" },
  { name: "Albee Bee", category: "Animals - Bugs & Insects", color: "images/50_Albee_Bee_color.png", silhouette: "images/50_Albee_Bee_silhouette.png", amazon: "https://amzn.to/4e35G94" },
];

// 60 additional names (not yet in game)
const NAMES_ONLY = [
  "Bashful Beige Bunny","Bashful Pink Bunny","Bashful Cream Bunny","Bashful Blue Bunny","Bashful Silver Bunny",
  "Bartholomew Bear Strawberry","Bartholomew Bear Bat","Little Bear","Ambalie Bear",
  "Snow Dragon","Sage Dragon","Adon Dragon",
  "Amuseables Avocado","Amuseables Toast","Amuseables Strawberry","Amuseables Lemon","Amuseables Orange",
  "Amuseables Watermelon","Amuseables Blueberry","Amuseables Pumpkin","Amuseables Birthday Cake",
  "Amuseables Donut","Amuseables Macaron","Amuseables Pizza","Amuseables Coffee Cup",
  "Amuseables Toilet Roll","Amuseables Gelato","Amuseables Cloud","Amuseables Sun",
  "Amuseables Rainbow","Amuseables Happy Raindrop","Amuseables Cactus","Amuseables Mushroom",
  "Amuseables Sandcastle","Amuseables Skateboard","Amuseables Boiled Egg","Amuseables Snowflake",
  "Odell Octopus","Nessie Sea Monster","Amuseables Lobster","Amuseables Crab",
  "Peanut Penguin","Chip Seagull","Birdling Pigeon",
  "Albee Bee","Brynlee Bee","Honeyhome Bee",
  "Fergus Frog","Fabian Frog Prince",
  "Lachlan Sad Rat","Smudge Rabbit","Smudge Fox","Slackajack Monkey",
  "Sacha Snow Tiger","Alonso Alpaca","Large Truffles Sheep","Floofie Sheepdog",
  "Flower Bouquet","Messenger Bunny","Jellycat Jack","Clyde Capybara"
];

// Combined list for dropdown (deduplicated)
const inGameNames = new Set(IN_GAME.map(j => j.name));
const ALL_NAMES = [
  ...IN_GAME.map(j => ({ name: j.name, inGame: true })),
  ...NAMES_ONLY.filter(n => !inGameNames.has(n)).map(n => ({ name: n, inGame: false }))
].sort((a, b) => a.name.localeCompare(b.name));

// =============================================
// STATE
// =============================================
let currentJelly = null;
let guessCount = 0;
let selectedName = '';
let usedIndices = [];
let activeDropdownIndex = -1;

// =============================================
// DOM
// =============================================
const jellyImg = document.getElementById('jellyImg');
const gameSection = document.getElementById('gameSection');
const resultSection = document.getElementById('resultSection');
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');
const btnGuess = document.getElementById('btnGuess');
const btnSkip = document.getElementById('btnSkip');
const hintBox = document.getElementById('hintBox');
const dot1 = document.getElementById('dot1');
const dot2 = document.getElementById('dot2');
const dot3 = document.getElementById('dot3');
const confettiContainer = document.getElementById('confettiContainer');

// =============================================
// GAME LOGIC
// =============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  // Reset
  guessCount = 0;
  selectedName = '';
  activeDropdownIndex = -1;
  hintBox.classList.remove('visible');
  hintBox.textContent = '';
  searchInput.value = '';
  btnGuess.disabled = true;
  dropdown.classList.remove('open');
  dot1.className = 'dot';
  dot2.className = 'dot';
  dot3.className = 'dot';
  searchInput.disabled = false;
  btnGuess.disabled = true;
  btnSkip.style.display = '';

  // Reset usedIndices if all used
  if (usedIndices.length >= IN_GAME.length) usedIndices = [];

  // Pick random unused jelly
  const available = IN_GAME.map((_, i) => i).filter(i => !usedIndices.includes(i));
  const idx = available[Math.floor(Math.random() * available.length)];
  usedIndices.push(idx);
  currentJelly = IN_GAME[idx];

  jellyImg.src = currentJelly.silhouette;
  jellyImg.className = 'jelly-img silhouette';

  gameSection.style.display = 'block';
  resultSection.classList.remove('visible');
}

function revealResult(won) {
  gameSection.style.display = 'none';
  resultSection.classList.add('visible');

  const resultEmoji = document.getElementById('resultEmoji');
  const resultTitle = document.getElementById('resultTitle');
  const resultMsg = document.getElementById('resultMsg');
  const resultImg = document.getElementById('resultImg');
  const resultName = document.getElementById('resultName');
  const btnAmazon = document.getElementById('btnAmazon');

  resultImg.src = currentJelly.color;
  resultName.textContent = currentJelly.name;
  btnAmazon.href = currentJelly.amazon;

  if (won) {
    resultEmoji.textContent = '🎉';
    resultTitle.textContent = 'You got it!';
    resultTitle.className = 'result-title win';
    resultMsg.textContent = 'Amazing! You really know your Jellycats! 🐾';
    launchConfetti();
  } else {
    resultEmoji.textContent = '💛';
    resultTitle.textContent = 'Nice try!';
    resultTitle.className = 'result-title lose';
    resultMsg.textContent = `It was the ${currentJelly.name}! Better luck next time 🌸`;
  }
}

function makeGuess() {
  if (!selectedName) return;

  const correct = selectedName.trim().toLowerCase() === currentJelly.name.trim().toLowerCase();

  if (correct) {
    if (guessCount === 0) dot1.className = 'dot used';
    else if (guessCount === 1) dot2.className = 'dot used';
    else dot3.className = 'dot used';
    setTimeout(() => revealResult(true), 300);
    return;
  }

  // Wrong guess
  if (guessCount === 0) {
    dot1.className = 'dot wrong';
    guessCount = 1;
    hintBox.textContent = `💡 Hint: Category is "${currentJelly.category}"`;
    hintBox.classList.add('visible');
    searchInput.value = '';
    selectedName = '';
    btnGuess.disabled = true;
    searchInput.classList.add('shake');
    setTimeout(() => searchInput.classList.remove('shake'), 400);
  } else if (guessCount === 1) {
    dot2.className = 'dot wrong';
    guessCount = 2;
    searchInput.value = '';
    selectedName = '';
    btnGuess.disabled = true;
    searchInput.classList.add('shake');
    setTimeout(() => searchInput.classList.remove('shake'), 400);
  } else {
    dot3.className = 'dot wrong';
    searchInput.disabled = true;
    btnGuess.disabled = true;
    btnSkip.style.display = 'none';
    setTimeout(() => revealResult(false), 400);
  }
}

// =============================================
// DROPDOWN
// =============================================
function renderDropdown(query) {
  const q = query.toLowerCase().trim();
  const filtered = q
    ? ALL_NAMES.filter(n => n.name.toLowerCase().includes(q))
    : ALL_NAMES;

  if (!filtered.length || !q) {
    dropdown.classList.remove('open');
    return;
  }

  activeDropdownIndex = -1;
  dropdown.innerHTML = filtered.slice(0, 30).map((item, i) =>
    `<div class="dropdown-item" data-name="${item.name}" data-index="${i}">
      ${item.name}
    </div>`
  ).join('');

  dropdown.classList.add('open');

  dropdown.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      selectName(el.dataset.name);
    });
  });
}

function selectName(name) {
  selectedName = name;
  searchInput.value = name;
  dropdown.classList.remove('open');
  btnGuess.disabled = false;
}

searchInput.addEventListener('input', e => {
  selectedName = '';
  btnGuess.disabled = true;
  renderDropdown(e.target.value);
});

searchInput.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.dropdown-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeDropdownIndex = Math.min(activeDropdownIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeDropdownIndex));
    if (items[activeDropdownIndex]) items[activeDropdownIndex].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeDropdownIndex = Math.max(activeDropdownIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === activeDropdownIndex));
  } else if (e.key === 'Enter') {
    if (activeDropdownIndex >= 0 && items[activeDropdownIndex]) {
      selectName(items[activeDropdownIndex].dataset.name);
    } else if (selectedName) {
      makeGuess();
    }
  } else if (e.key === 'Escape') {
    dropdown.classList.remove('open');
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open');
});

btnGuess.addEventListener('click', makeGuess);

btnSkip.addEventListener('click', () => {
  if (guessCount === 0) {
    dot1.className = 'dot wrong';
    guessCount = 1;
    hintBox.textContent = `💡 Hint: Category is "${currentJelly.category}"`;
    hintBox.classList.add('visible');
    searchInput.value = '';
    selectedName = '';
    btnGuess.disabled = true;
  } else if (guessCount === 1) {
    dot2.className = 'dot wrong';
    guessCount = 2;
    searchInput.value = '';
    selectedName = '';
    btnGuess.disabled = true;
  } else {
    dot3.className = 'dot wrong';
    btnSkip.style.display = 'none';
    setTimeout(() => revealResult(false), 300);
  }
});

document.getElementById('btnPlayAgain').addEventListener('click', startGame);

// Spacebar starts new game when result is showing
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && resultSection.classList.contains('visible') && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    startGame();
  }
});

// =============================================
// CONFETTI
// =============================================
function launchConfetti() {
  confettiContainer.innerHTML = '';
  const colors = ['#ff6b9d','#ffd166','#06d6a0','#6bcbff','#c77dff','#ff8c42','#fff'];
  const shapes = ['border-radius:0','border-radius:50%','clip-path:polygon(50% 0%,0% 100%,100% 100%)'];

  for (let i = 0; i < 120; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const size = Math.random() * 10 + 6;
    piece.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      ${shapes[Math.floor(Math.random() * shapes.length)]};
      animation-duration: ${Math.random() * 2 + 2}s;
      animation-delay: ${Math.random() * 0.8}s;
    `;
    confettiContainer.appendChild(piece);
  }
  setTimeout(() => confettiContainer.innerHTML = '', 4000);
}

// =============================================
// START
// =============================================
startGame();
</script>
</body>
</html>
